version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nstp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nstp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nstp_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nstp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-nstp}:${POSTGRES_PASSWORD:-nstp_secret}@postgres:5432/${POSTGRES_DB:-nstp_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_secure_random_secret}
      JWT_EXPIRES_IN: 24h
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bipsu.edu.ph}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin2026}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata: